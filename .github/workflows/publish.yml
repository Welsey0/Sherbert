name: Publish

on:
  push:
    branches: [ main ]
    paths: [ changelog.md ]
  workflow_dispatch:
    inputs:
      allow_empty_artifacts:
        description: "Allow run to continue even if no .mrpack files are generated"
        required: false
        default: false
        type: boolean

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    name: Build and Release
    runs-on: ubuntu-latest
    env:
      PACK_NAME: Sherbert
    outputs:
      upload_matrix: ${{ steps.discover.outputs.upload_matrix }}
      has_uploads: ${{ steps.discover.outputs.has_uploads }}
      version: ${{ steps.get_version.outputs.value }}
      mc_version: ${{ steps.get_minecraft_version.outputs.value }}
      changelog: ${{ steps.get_changelog.outputs.changelog_content }}
      release_name: ${{ steps.construct_name.outputs.release_name }}
      channel: ${{ steps.determine_channel.outputs.channel }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Packwiz
        uses: actionhippie/install-packwiz@v1

      - name: Bootstrap loader folders
        run: |
          python stmanager.py setup-folders --yes

      - name: Sync pack content
        run: |
          python stmanager.py sync-content --write-unsuccessful

      - name: Update versioned files
        run: |
          python stmanager.py update-updatables

      - name: Validate pack structure
        run: |
          python stmanager.py validate --report-file validation-report.json

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: validation-report.json
          if-no-files-found: warn

      - name: Build the modpack
        run: |
          python stmanager.py build

      - name: Get Version
        id: get_version
        uses: sravinet/toml-select@v1.0.1
        with:
          file: packinfo.toml
          field: version

      - name: Get Minecraft Version
        id: get_minecraft_version
        uses: sravinet/toml-select@v1.0.1
        with:
          file: packinfo.toml
          field: targets.mc

      - name: Ensure version has not already been released
        env:
          VERSION: ${{ steps.get_version.outputs.value }}
          REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODRINTH_PID: ${{ secrets.MODRINTH_PID }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys
          import urllib.error
          import urllib.request

          version = os.environ.get("VERSION", "").strip()
          repository = os.environ.get("REPOSITORY", "").strip()
          github_token = os.environ.get("GITHUB_TOKEN", "").strip()
          modrinth_pid = os.environ.get("MODRINTH_PID", "").strip()

          if not version:
            print("ERROR: version value is empty.", file=sys.stderr)
            sys.exit(1)

          # 1) Guard against duplicate git tags in origin.
          tag_ref = f"refs/tags/{version}"
          ls_remote = subprocess.run(
            ["git", "ls-remote", "--tags", "origin", tag_ref],
            capture_output=True,
            text=True,
          )
          if ls_remote.returncode != 0:
            print(
              f"ERROR: failed to query remote tags: {ls_remote.stderr.strip()}",
              file=sys.stderr,
            )
            sys.exit(1)
          if ls_remote.stdout.strip():
            print(
              f"ERROR: version '{version}' is already tagged in origin. Bump the version before publishing.",
              file=sys.stderr,
            )
            sys.exit(1)

          # 2) Guard against duplicate GitHub release tag.
          if repository:
            release_url = f"https://api.github.com/repos/{repository}/releases/tags/{version}"
            release_headers = {
              "Accept": "application/vnd.github+json",
              "User-Agent": "sherbert-release-check",
            }
            if github_token:
              release_headers["Authorization"] = f"Bearer {github_token}"
            req = urllib.request.Request(
              release_url,
              headers=release_headers,
            )
            try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                if resp.status == 200:
                  print(
                    f"ERROR: GitHub release tag '{version}' already exists. Bump the version before publishing.",
                    file=sys.stderr,
                  )
                  sys.exit(1)
            except urllib.error.HTTPError as e:
              if e.code != 404:
                print(
                  f"ERROR: failed checking GitHub releases ({e.code}).",
                  file=sys.stderr,
                )
                sys.exit(1)
            except Exception as e:
              print(f"ERROR: failed checking GitHub releases: {e}", file=sys.stderr)
              sys.exit(1)

          # 3) Guard against duplicate Modrinth version numbers used by this workflow.
          if modrinth_pid:
            try:
              with open("packinfo.toml", "rb") as f:
                import tomllib

                cfg = tomllib.load(f)
            except Exception as e:
              print(f"ERROR: failed to read packinfo.toml: {e}", file=sys.stderr)
              sys.exit(1)

            packinfo_version = str(cfg.get("version", "")).strip()
            if not packinfo_version:
              print("ERROR: packinfo.toml version is empty.", file=sys.stderr)
              sys.exit(1)
            if packinfo_version != version:
              print(
                f"ERROR: version mismatch: src/pack.toml={version} but packinfo.toml={packinfo_version}. Bump/sync versions before publishing.",
                file=sys.stderr,
              )
              sys.exit(1)

            targets = cfg.get("targets", {})
            loaders = [
              key
              for key, value in targets.items()
              if key != "mc" and str(value).lower() != "none"
            ]
            expected_numbers = {f"{version}-{loader}" for loader in loaders}

            versions_url = f"https://api.modrinth.com/v2/project/{modrinth_pid}/version"
            req = urllib.request.Request(
              versions_url,
              headers={"User-Agent": "sherbert-release-check"},
            )
            try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                payload = json.loads(resp.read().decode("utf-8"))
            except Exception as e:
              print(f"ERROR: failed checking Modrinth versions: {e}", file=sys.stderr)
              sys.exit(1)

            existing_numbers = {
              item.get("version_number", "")
              for item in payload
              if isinstance(item, dict)
            }
            collisions = sorted(num for num in expected_numbers if num in existing_numbers)
            if collisions:
              print(
                "ERROR: Modrinth already contains these version_number values: "
                + ", ".join(collisions)
                + ". Bump the version before publishing.",
                file=sys.stderr,
              )
              sys.exit(1)

          print(f"Version safety check passed for version '{version}'.")
          PY

      - name: Get Changelog
        id: get_changelog
        run: |
          changelog_content=$(cat changelog.md)
          echo "changelog_content<<EOF" >> "$GITHUB_OUTPUT"
          echo "$changelog_content" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Construct Release Name
        id: construct_name
        run: |
          release_name="${{ env.PACK_NAME }} ${{ steps.get_version.outputs.value }}"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"

      - name: Determine Channel
        id: determine_channel
        run: |
          if [[ "${{ steps.construct_name.outputs.release_name }}" == *"beta"* ]]; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
          else
            echo "channel=release" >> "$GITHUB_OUTPUT"
          fi

      - name: Discover upload targets
        id: discover
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib, glob, json, re

          with open("packinfo.toml", "rb") as f:
              cfg = tomllib.load(f)

          targets = cfg.get("targets", {})
          loaders = [k for k, v in targets.items() if k != "mc" and str(v).lower() != "none"]

          files = sorted(glob.glob("*.mrpack"))
          matrix = []

          for loader in loaders:
              pat = re.compile(rf"(^|[-_.]){re.escape(loader)}([-.]|$)", re.IGNORECASE)
              matched = [f for f in files if pat.search(f)]
              for file in matched:
                  matrix.append({"loader": loader, "file": file})

          # Fallback for single-loader/single-file naming that doesn't include loader token.
          if not matrix and len(loaders) == 1 and len(files) == 1:
              matrix = [{"loader": loaders[0], "file": files[0]}]

          print(f"upload_matrix={json.dumps(matrix)}")
          print(f"has_uploads={'true' if matrix else 'false'}")
          print(f"artifact_count={len(files)}")
          PY

      - name: Fail if no artifacts were built
        if: steps.discover.outputs.has_uploads != 'true' && !(github.event_name == 'workflow_dispatch' && github.event.inputs.allow_empty_artifacts == 'true')
        run: |
          echo "No uploadable .mrpack files were found in repository root after build."
          echo "Set workflow_dispatch input allow_empty_artifacts=true to bypass this check."
          exit 1

      - name: Validate required publishing secrets
        if: steps.discover.outputs.has_uploads == 'true'
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PID: ${{ secrets.MODRINTH_PID }}
        run: |
          python - <<'PY'
          import os
          import sys

          missing = []
          for key in ("MODRINTH_TOKEN", "MODRINTH_PID"):
            if not os.environ.get(key, "").strip():
              missing.append(key)

          if missing:
            print(
              "ERROR: missing required GitHub Actions secret(s): " + ", ".join(missing),
              file=sys.stderr,
            )
            sys.exit(1)
          PY

      - name: Create Release
        if: steps.discover.outputs.has_uploads == 'true'
        id: create_release
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: ${{ steps.get_version.outputs.value }}
          name: ${{ steps.construct_name.outputs.release_name }}
          body: ${{ steps.get_changelog.outputs.changelog_content }}
          files: ./*.mrpack
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload_modrinth:
    name: Upload to Modrinth
    needs: publish
    if: needs.publish.outputs.has_uploads == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        item: ${{ fromJSON(needs.publish.outputs.upload_matrix) }}

    steps:
      - name: Download mrpack(s) from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ needs.publish.outputs.version }} \
            --pattern "*.mrpack" \
            --repo ${{ github.repository }}

      - name: Upload artifact to Modrinth
        uses: Kir-Antipov/mc-publish@v3
        with:
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-id: ${{ secrets.MODRINTH_PID }}
          files: ${{ matrix.item.file }}
          name: ${{ needs.publish.outputs.release_name }} (${{ matrix.item.loader }})
          version: ${{ needs.publish.outputs.version }}-${{ matrix.item.loader }}
          changelog: ${{ needs.publish.outputs.changelog }}
          game-versions: ${{ needs.publish.outputs.mc_version }}
          version-type: ${{ needs.publish.outputs.channel }}
          loaders: ${{ matrix.item.loader }}
          modrinth-featured: true